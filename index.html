<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teaching Materials</title>
    <meta name="description" content="A wiki of interactive teaching materials and explanations.">
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f7f7f8;
            --fg: #1a1a1a;
            --muted: #666;
            --card: #fff;
            --border: #e5e5e7;
            --accent: #5b3fd9;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #131316;
                --fg: #f0f0f2;
                --muted: #9a9aa3;
                --card: #1c1c20;
                --border: #2a2a30;
                --accent: #9d86ff;
            }
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.5;
            min-height: 100vh;
        }
        main {
            max-width: 720px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
        }
        h1 {
            font-size: 2rem;
            margin: 0 0 0.5rem;
            letter-spacing: -0.02em;
        }
        .subtitle {
            color: var(--muted);
            margin: 0 0 3rem;
        }
        h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin: 2.5rem 0 1rem;
            font-weight: 600;
        }
        .lessons {
            display: grid;
            gap: 0.75rem;
        }
        a.lesson {
            display: block;
            padding: 1.25rem 1.5rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--fg);
            text-decoration: none;
            transition: transform 0.15s ease, border-color 0.15s ease;
        }
        a.lesson:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }
        .lesson-title {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 0.25rem;
        }
        .lesson-desc {
            color: var(--muted);
            font-size: 0.9rem;
        }
        footer {
            margin-top: 4rem;
            color: var(--muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <main>
        <h1>Teaching Materials</h1>
        <p class="subtitle">Interactive demos and explanations.</p>

        <h2>Redux</h2>
        <div class="lessons">
            <a class="lesson" href="redux/react-redux-v6-issue.html">
                <div class="lesson-title">React-Redux v6: The Performance Problem</div>
                <div class="lesson-desc">Why React-Redux v6</div>
            </a>
            <a class="lesson" href="redux/redux-flow-demo.html">
                <div class="lesson-title">Redux Data Flow — Interactive Demo</div>
                <div class="lesson-desc">Step through the Redux data flow interactively: actions, reducers, store, and subscribers.</div>
            </a>
        </div>
    </main>
</body>
</html>
